<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Class Management</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="navbar">
    <h1>Smart Attendance</h1>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
        <a href="appearances.html">Appearances</a>
        <a href="classes.html">Classes</a>
        <a href="recognize.html">Recognize</a>
        <a href="attendance.html">Attendance</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="policies.html">Policies</a>
        <a href="excuses.html">Excuses</a>
    </div>
</div>

<div class="container">

    <div class="card">
        <h2>Create Class</h2>

        <input type="text" id="courseName" placeholder="Course Name">
        <br>
        <input type="text" id="courseCode" placeholder="Course Code">
        <br>
        <input type="text" id="professorName" placeholder="Professor Name">
        <br><br>

        <button onclick="createClass()">Create Class</button>

        <p id="createResult"></p>
    </div>

    <div class="card">
        <h2>Add Student to Class</h2>

        <label>Select Class:</label>
        <br>
        <select id="classSelect"></select>

        <br><br>

        <label>Select Student:</label>
        <br>
        <select id="studentSelect"></select>

        <br><br>

        <button onclick="addStudentToClass()">Add Student</button>

        <p id="addResult"></p>
    </div>

    <div class="card">
        <h2>Class Roster</h2>

        <label>Select Class:</label>
        <br>
        <select id="rosterClassSelect" onchange="loadRoster()"></select>

        <h3 id="rosterCount">Total Students: 0</h3>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Student ID</th>
                    <th>Student Name</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="rosterTable"></tbody>
        </table>
    </div>

    <div class="card">
        <h2>Classes</h2>
        <button onclick="loadClasses()">Refresh Classes</button>
        <br><br>

        <table>
            <thead>
                <tr>
                    <th>Class ID</th>
                    <th>Course Code</th>
                    <th>Course Name</th>
                    <th>Professor</th>
                </tr>
            </thead>
            <tbody id="classesTable"></tbody>
        </table>
    </div>

</div>
<script src="config.js"></script>

<script>
    let allClasses = [];
    let allStudents = [];

    async function createClass() {
        const formData = new FormData();
        formData.append(
            "course_name",
            document.getElementById("courseName").value
        );
        formData.append(
            "course_code",
            document.getElementById("courseCode").value
        );
        formData.append(
            "professor_name",
            document.getElementById("professorName").value
        );

        const result = document.getElementById("createResult");

        try {
            const response = await fetch(`${API_BASE_URL}/classes`, {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            if (response.ok && data.success) {
                result.innerText = "Class created successfully.";
                await loadClasses();
                populateClassDropdowns();
            } else {
                result.innerText =
                    "Error: " + (data.error || "Unable to create class.");
            }

        } catch (error) {
            console.log(error);
            result.innerText = "Request failed.";
        }
    }

    async function loadClasses() {
        const table = document.getElementById("classesTable");
        table.innerHTML = "";

        try {
            const response = await fetch(`${API_BASE_URL}/classes`);
            const data = await response.json();

            allClasses = data.classes || [];

            if (!response.ok || allClasses.length === 0) {
                table.innerHTML =
                    "<tr><td colspan='4'>No classes found</td></tr>";

                populateClassDropdowns();
                return;
            }

            allClasses.forEach(cls => {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${cls.id}</td>
                    <td>${cls.course_code}</td>
                    <td>${cls.course_name}</td>
                    <td>${cls.professor_name}</td>
                `;

                table.appendChild(row);
            });

            populateClassDropdowns();

        } catch (error) {
            console.log(error);

            allClasses = [];
            table.innerHTML =
                "<tr><td colspan='4'>Request failed</td></tr>";

            populateClassDropdowns();
        }
    }

    async function loadStudents() {
        const studentSelect =
            document.getElementById("studentSelect");

        studentSelect.innerHTML = "";

        try {
            const response = await fetch(`${API_BASE_URL}/students`);
            const data = await response.json();

            allStudents = data.students || [];

            if (!response.ok || allStudents.length === 0) {
                studentSelect.innerHTML =
                    '<option value="">No students found</option>';
                return;
            }

            allStudents.forEach(student => {
                const option = document.createElement("option");

                option.value = student.student_id;
                option.textContent =
                    `${student.student_name} (${student.student_id})`;

                studentSelect.appendChild(option);
            });

        } catch (error) {
            console.log(error);

            allStudents = [];
            studentSelect.innerHTML =
                '<option value="">Failed to load students</option>';
        }
    }

    function populateClassDropdowns() {
        const classSelect =
            document.getElementById("classSelect");
        const rosterClassSelect =
            document.getElementById("rosterClassSelect");

        classSelect.innerHTML = "";
        rosterClassSelect.innerHTML = "";

        if (allClasses.length === 0) {
            classSelect.innerHTML =
                '<option value="">No classes found</option>';

            rosterClassSelect.innerHTML =
                '<option value="">No classes found</option>';

            return;
        }

        allClasses.forEach(cls => {
            const label =
                `${cls.course_code} - ${cls.course_name}`;

            const option1 = document.createElement("option");
            option1.value = cls.id;
            option1.textContent = label;
            classSelect.appendChild(option1);

            const option2 = document.createElement("option");
            option2.value = cls.id;
            option2.textContent = label;
            rosterClassSelect.appendChild(option2);
        });

        loadRoster();
    }

    async function addStudentToClass() {
        const classId =
            document.getElementById("classSelect").value;

        const studentId =
            document.getElementById("studentSelect").value;

        const result =
            document.getElementById("addResult");

        if (!classId || !studentId) {
            result.innerText =
                "Please select a valid class and student.";
            return;
        }

        const formData = new FormData();
        formData.append("class_id", classId);
        formData.append("student_id", studentId);

        try {
            const response = await fetch(
                `${API_BASE_URL}/class-students`,
                {
                    method: "POST",
                    body: formData
                }
            );

            const data = await response.json();

            if (response.ok && data.success) {
                result.innerText = "Student added to class.";
                await loadRoster();
            } else {
                result.innerText =
                    "Error: " +
                    (data.error || "Unable to add student.");
            }

        } catch (error) {
            console.log(error);
            result.innerText = "Request failed.";
        }
    }

    async function loadRoster() {
        const classId =
            document.getElementById("rosterClassSelect").value;

        const table =
            document.getElementById("rosterTable");

        const count =
            document.getElementById("rosterCount");

        table.innerHTML = "";
        count.innerText = "Total Students: 0";

        if (!classId) {
            return;
        }

        try {
            const response = await fetch(
                `${API_BASE_URL}/class-students/${classId}`
            );

            const data = await response.json();
            const students = data.students || [];

            if (!response.ok) {
                table.innerHTML =
                    "<tr><td colspan='4'>Failed to load roster</td></tr>";
                return;
            }

            count.innerText =
                "Total Students: " + students.length;

            if (students.length === 0) {
                table.innerHTML =
                    "<tr><td colspan='4'>No students enrolled in this class</td></tr>";
                return;
            }

            students.forEach((student, index) => {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${student.student_id}</td>
                    <td>${student.student_name}</td>
                    <td>
                        <button
                            onclick="removeStudentFromClass(
                                '${classId}',
                                '${student.student_id}'
                            )"
                        >
                            Remove
                        </button>
                    </td>
                `;

                table.appendChild(row);
            });

        } catch (error) {
            console.log(error);

            table.innerHTML =
                "<tr><td colspan='4'>Request failed</td></tr>";
        }
    }

    async function removeStudentFromClass(classId, studentId) {
        try {
            const response = await fetch(
                `${API_BASE_URL}/class-students/${classId}/${studentId}`,
                {
                    method: "DELETE"
                }
            );

            const data = await response.json();

            if (response.ok && data.success) {
                await loadRoster();
            } else {
                alert(
                    data.error ||
                    "Error removing student."
                );
            }

        } catch (error) {
            console.log(error);
            alert("Request failed.");
        }
    }

    window.onload = async function () {
        await loadClasses();
        await loadStudents();
    };
</script>

</body>
</html>
