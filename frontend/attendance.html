<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Attendance History</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="navbar">
    <h1>Smart Attendance</h1>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
        <a href="appearances.html">Appearances</a>
        <a href="recognize.html">Recognize</a>
        <a href="attendance.html">Attendance</a>
        <a href="dashboard.html">Dashboard</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2>Attendance History</h2>

        <label>Select Date:</label>
        <input type="date" id="attendanceDate">
        <button onclick="loadAttendance()">Load Attendance</button>

        <h3 id="count">Total Records: 0</h3>
        <p id="message">Please select a date to view attendance records.</p>
    </div>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Student ID</th>
                <th>Student Name</th>
                <th>Check-in Time</th>
            </tr>
        </thead>
        <tbody id="attendanceTable"></tbody>
    </table>
</div>

<script>
    function formatTime(timestamp) {
        const date = new Date(timestamp);
        return date.toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    async function loadAttendance() {
        const table = document.getElementById("attendanceTable");
        const count = document.getElementById("count");
        const message = document.getElementById("message");
        const selectedDate = document.getElementById("attendanceDate").value;

        table.innerHTML = "";
        count.innerText = "Total Records: 0";

        if (!selectedDate) {
            message.innerText = "Please select a date to view attendance records.";
            return;
        }

        message.innerText = "Loading attendance records...";

        const url = "http://127.0.0.1:5000/attendance?date=" + selectedDate;

        try {
            const response = await fetch(url);
            const data = await response.json();

            if (!data.success) {
                message.innerText = "Failed to load attendance records.";
                return;
            }

            count.innerText = "Total Records: " + data.attendance.length;

            if (data.attendance.length === 0) {
                message.innerText = "No attendance records found for this date.";
                return;
            }

            message.innerText = "Showing attendance for " + selectedDate;

            data.attendance.forEach((record, index) => {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${record.student_id}</td>
                    <td>${record.student_name}</td>
                    <td>${formatTime(record.timestamp)}</td>
                `;

                table.appendChild(row);
            });

        } catch (error) {
            console.log(error);
            message.innerText = "Request failed.";
        }
    }
</script>

</body>
</html>
