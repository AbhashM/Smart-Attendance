<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Attendance History</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="navbar">
    <h1>Smart Attendance</h1>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
        <a href="recognize.html">Recognize</a>
        <a href="attendance.html">Attendance</a>
        <a href="dashboard.html">Dashboard</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2>Attendance History</h2>

        <label>Select Date:</label>
        <input type="date" id="attendanceDate">
        <button onclick="loadAttendance()">Load Attendance</button>

        <h3 id="count">Total Records: 0</h3>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Student ID</th>
                <th>Student Name</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody id="attendanceTable"></tbody>
    </table>
</div>

<script>
    async function loadAttendance() {
        const table = document.getElementById("attendanceTable");
        const count = document.getElementById("count");
        const selectedDate = document.getElementById("attendanceDate").value;

        table.innerHTML = "";
        count.innerText = "Total Records: 0";

        let url = "http://127.0.0.1:5000/attendance";

        if (selectedDate) {
            url += "?date=" + selectedDate;
        }

        try {
            const response = await fetch(url);
            const data = await response.json();

            count.innerText = "Total Records: " + data.attendance.length;

            if (data.attendance.length === 0) {
                table.innerHTML = "<tr><td colspan='4'>No attendance records found</td></tr>";
                return;
            }

            data.attendance.forEach(record => {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${record.id}</td>
                    <td>${record.student_id}</td>
                    <td>${record.student_name}</td>
                    <td>${record.timestamp}</td>
                `;

                table.appendChild(row);
            });

        } catch (error) {
            table.innerHTML = "<tr><td colspan='4'>Request failed</td></tr>";
        }
    }

    window.onload = loadAttendance;
</script>

</body>
</html>
