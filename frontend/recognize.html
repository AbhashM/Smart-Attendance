<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Recognize Student</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="navbar">
    <h1>Smart Attendance</h1>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
        <a href="appearances.html">Appearances</a>
        <a href="classes.html">Classes</a>
        <a href="recognize.html">Recognize</a>
        <a href="attendance.html">Attendance</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="policies.html">Policies</a>
        <a href="excuses.html">Excuses</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2>Recognize Student</h2>

        <label>Select Class:</label>
        <br>
        <select id="classSelect"></select>

        <br><br>

        <input type="file" id="testImage" accept="image/*">

        <br><br>

        <button id="recognizeBtn" type="button">
            Recognize & Mark Attendance
        </button>

        <p id="result">Waiting for input...</p>
    </div>
</div>

<script src="config.js"></script>

<script>
    async function loadClasses() {
        const select = document.getElementById("classSelect");
        select.innerHTML = "";

        try {
            const response = await fetch(`${API_BASE_URL}/classes`);
            const data = await response.json();

            if (!response.ok || !data.classes || data.classes.length === 0) {
                select.innerHTML =
                    '<option value="">No classes found</option>';
                return;
            }

            data.classes.forEach(cls => {
                const option = document.createElement("option");

                option.value = cls.id;
                option.textContent =
                    cls.course_code + " - " + cls.course_name;

                select.appendChild(option);
            });

        } catch (error) {
            console.log(error);

            select.innerHTML =
                '<option value="">Failed to load classes</option>';
        }
    }

    document
        .getElementById("recognizeBtn")
        .addEventListener("click", async function () {
            const classId =
                document.getElementById("classSelect").value;
            const fileInput =
                document.getElementById("testImage");
            const resultText =
                document.getElementById("result");
            const recognizeButton =
                document.getElementById("recognizeBtn");

            if (!classId) {
                resultText.textContent =
                    "Please select a valid class.";
                return;
            }

            if (!fileInput.files.length) {
                resultText.textContent =
                    "Please choose an image first.";
                return;
            }

            resultText.textContent = "Recognizing student...";
            recognizeButton.disabled = true;

            const formData = new FormData();
            formData.append("class_id", classId);
            formData.append("image", fileInput.files[0]);

            try {
                const response = await fetch(
                    `${API_BASE_URL}/recognize`,
                    {
                        method: "POST",
                        body: formData
                    }
                );

                const data = await response.json();

                if (response.ok && data.success) {
                    resultText.textContent =
                        "Attendance marked for " +
                        data.student_name +
                        " (" +
                        data.student_id +
                        ") as " +
                        data.status +
                        " at " +
                        data.timestamp;
                } else {
                    resultText.textContent =
                        "Error: " +
                        (data.error || "Recognition failed.");
                }

            } catch (error) {
                console.log(error);
                resultText.textContent = "Request failed.";
            } finally {
                recognizeButton.disabled = false;
            }
        });

    window.onload = loadClasses;
</script>

</body>
</html>
