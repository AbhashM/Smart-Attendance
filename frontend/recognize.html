<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Recognize Student</title>
</head>
<body>
    <h2>Recognize Student</h2>

    <input type="file" id="testImage" />
    <br><br>
    <button id="recognizeBtn" type="button">Recognize</button>

    <p id="result">Waiting for input...</p>

    <script>
        document.getElementById("recognizeBtn").addEventListener("click", async function () {
            const fileInput = document.getElementById("testImage");
            const resultText = document.getElementById("result");

            if (!fileInput.files.length) {
                resultText.textContent = "Please choose an image first.";
                alert("Please choose an image first.");
                return;
            }

            resultText.textContent = "Recognizing student...";

            const formData = new FormData();
            formData.append("image", fileInput.files[0]);

            try {
                const response = await fetch("http://127.0.0.1:5000/recognize", {
                    method: "POST",
                    body: formData
                });

                const text = await response.text();
                console.log("RAW RESPONSE:", text);
                alert("Raw response: " + text);

                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    resultText.textContent = "Server returned invalid JSON.";
                    alert("Server returned invalid JSON.");
                    return;
                }

                if (data.success) {
                    const msg = "Student Recognized: " + data.student_name + " (" + data.student_id + ")";
                    resultText.textContent = msg;
                    alert(msg);
                } else {
                    const msg = "Error: " + data.error;
                    resultText.textContent = msg;
                    alert(msg);
                }

            } catch (error) {
                console.log("FETCH ERROR:", error);
                resultText.textContent = "Request failed.";
                alert("Request failed.");
            }
        });
    </script>
</body>
</html>
