<!DOCTYPE html>
<html>
<head>
    <title>Smart Attendance</title>
</head>
<body>
    <h2>Face Detection Test</h2>

    <form id="uploadForm">
        <input type="file" id="imageInput" required />
        <button type="submit">Detect Face</button>
    </form>

    <p id="result"></p>

   <script>
    const form = document.getElementById("uploadForm");
    const resultText = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        try {
            const fileInput = document.getElementById("imageInput");

            if (!fileInput.files.length) {
                resultText.innerText = "Please choose an image first.";
                return;
            }

            const formData = new FormData();
            formData.append("image", fileInput.files[0]);

            const response = await fetch("http://127.0.0.1:5000/detect", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            if (data.face_detected) {
                resultText.innerText = "Face Detected ✅";
            } else if (data.face_detected === false) {
                resultText.innerText = "No Face Detected ❌";
            } else if (data.error) {
                resultText.innerText = "Error: " + data.error;
            } else {
                resultText.innerText = "Unexpected response from server.";
            }
        } catch (error) {
            resultText.innerText = "Request failed. Check backend/CORS.";
            console.log(error);
        }
    });
</script>
</body>
</html>
